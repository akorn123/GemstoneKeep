name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project GemstoneKeep.xcodeproj

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project GemstoneKeep.xcodeproj \
            -target GemstoneKeep \
            -sdk iphonesimulator \
            -configuration Debug
