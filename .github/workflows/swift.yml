name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild build \
            -project GemstoneKeep.xcodeproj \
            -target GemstoneKeep \
            -sdk iphonesimulator \
            -configuration Debug \
            2>&1 | tee build.log

      - name: Print build log on failure
        if: failure()
        run: tail -n 120 build.log
